<section id="top" class="hero" [style.--hero-scroll-offset.px]="heroScrollOffset"
  [style.background-image]="'linear-gradient(120deg, rgba(5, 10, 14, 0.88), rgba(5, 10, 14, 0.42)), url(' + backgroundImage + ')'">
  <div class="hero__backdrop" aria-hidden="true"></div>
  <div class="hero__grain" aria-hidden="true"></div>
  <div class="section-shell visual-motion" appInteractiveMotion="1.05">
    <img [src]="showcaseImage" alt="LUMOCAST Signage product range" />
  </div>
</section>
